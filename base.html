<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Shorts Cloud Pro{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='app.css') }}" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
  {% if session.user_id %}
  <aside class="sidebar">
    <div class="brand"><i class="bi bi-lightning-charge-fill"></i> Shorts Cloud</div>
    <nav>
      <a href="/dashboard" class="nav-link {% if request.path=='/dashboard' %}active{% endif %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="/create" class="nav-link {% if request.path=='/create' %}active{% endif %}"><i class="bi bi-plus-circle"></i> Create</a>
      <a href="/history" class="nav-link {% if request.path.startswith('/history') %}active{% endif %}"><i class="bi bi-clock-history"></i> History</a>
      <a href="/connect_youtube" class="nav-link"><i class="bi bi-youtube"></i> YouTube</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/logout" class="btn btn-outline-danger btn-sm w-100"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
  </aside>
  {% endif %}
  
  <main class="main {% if not session.user_id %}full{% endif %}">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="toast-container">
        {% for cat, msg in messages %}
          <div class="alert alert-{{ 'danger' if cat=='error' else cat }} alert-dismissible fade show shadow">
            {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
