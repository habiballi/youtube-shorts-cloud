{% extends "base.html" %}
{% block title %}Login - Shorts Cloud{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="text-center mb-4">
      <i class="bi bi-lightning-charge-fill display-3 text-primary"></i>
      <h2 class="mt-2">Welcome Back</h2>
      <p class="text-secondary">AI YouTube Shorts Automation</p>
    </div>
    <form method="post">
      <div class="form-floating mb-3">
        <input name="username" class="form-control" id="u" placeholder="username" required>
        <label for="u">Username</label>
      </div>
      <div class="form-floating mb-3">
        <input name="password" type="password" class="form-control" id="p" placeholder="pass" required>
        <label for="p">Password</label>
      </div>
      <button class="btn btn-primary w-100 btn-lg">Login</button>
    </form>
    <div class="text-center mt-4">
      <span class="text-secondary">New here?</span> <a href="/register">Create account</a>
    </div>
  </div>
</div>
{% endblock %}
