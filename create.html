{% extends "base.html" %}
{% block content %}
<h1 class="h3 mb-4">Create Viral Short</h1>
<form method="post" action="/generate" class="card glass p-4">
  <div class="mb-4">
    <label class="form-label fw-bold">1. Topic or Idea</label>
    <textarea name="topic" class="form-control form-control-lg" rows="3" placeholder="e.g. 5 AI tools that will make you rich in 2025" required></textarea>
    <div class="form-text">AI will write script, find clips, add voiceover automatically.</div>
  </div>

  <div class="row g-3">
    <div class="col-md-4">
      <label class="form-label">Voiceover (ElevenLabs)</label>
      <select name="voice" class="form-select">
        <option>Adam - Deep Male</option>
        <option>Bella - Female</option>
        <option>Antoni - Calm Male</option>
        <option>Elli - Energetic Female</option>
        <option>Josh - Storyteller</option>
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Style</label>
      <select name="style" class="form-select">
        <option>Motivational</option>
        <option>Educational</option>
        <option>News</option>
        <option>Story</option>
        <option>Funny</option>
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Duration</label>
      <select name="duration" class="form-select">
        <option>30 seconds</option>
        <option selected>45 seconds</option>
        <option>60 seconds</option>
      </select>
    </div>
  </div>

  <hr class="my-4">

  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Schedule Upload (optional)</label>
      <input type="datetime-local" name="schedule" class="form-control">
    </div>
    <div class="col-md-6">
      <label class="form-label">YouTube Privacy</label>
      <select name="privacy" class="form-select">
        <option>public</option>
        <option>unlisted</option>
        <option>private</option>
      </select>
    </div>
  </div>

  <div class="form-check form-switch mt-4">
    <input class="form-check-input" type="checkbox" name="auto_hashtags" checked>
    <label class="form-check-label">Auto-generate hashtags & description with AI</label>
  </div>

  <button class="btn btn-primary btn-lg w-100 mt-4"><i class="bi bi-magic"></i> Generate & Upload to YouTube</button>
</form>
{% endblock %}
